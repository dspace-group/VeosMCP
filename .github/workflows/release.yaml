name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Build executable
        run: uv run --with pyinstaller pyinstaller --noconfirm --clean --distpath dist --workpath build/pyinstaller packaging/pyinstaller.spec

      - name: Generate third-party license report
        run: uv run --with pip-licenses --with pyinstaller pip-licenses --format=plain-vertical --with-license-file --output-file THIRD_PARTY_LICENSES.txt

      - name: Package release archive
        run: |
          New-Item -ItemType Directory -Force release-package | Out-Null
          Copy-Item dist\*.exe release-package\
          Copy-Item LICENSE release-package\
          Copy-Item THIRD_PARTY_LICENSES.txt release-package\
          Compress-Archive -Path release-package\* -DestinationPath dist\veos-mcp-windows.zip -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: veos-mcp-windows
          path: dist/veos-mcp-windows.zip
          if-no-files-found: error

      - name: Attach archive to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/veos-mcp-windows.zip