name: CI

on:
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --python 3.12 --extra dev

      - name: Run tests
        run: uv run pytest